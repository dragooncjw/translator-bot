name: 'issue-translator'
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: usthe/issues-translate-action@v2.7
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          issue-label: 'translation'
          IS_MODIFY_TITLE: true
          to: 'en'
